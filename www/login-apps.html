<!DOCTYPE html>
<html lang="id">

<head>
    <title>Login Aplikasi Workshop - BYD</title>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script>
        // Kill any existing Service Worker to prevent caching issues
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    
    <!-- Firebase SDK (v11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Konfigurasi Firebase BYD
        const firebaseConfig = {
            apiKey: "AIzaSyC7efhwFGSiNQWXvwqKgeNJP1g4Mx7D4aQ",
            authDomain: "trackingunit-byd.firebaseapp.com",
            projectId: "trackingunit-byd",
            storageBucket: "trackingunit-byd.firebasestorage.app",
            messagingSenderId: "554061694215",
            appId: "1:554061694215:web:869bfdd502fd5777fef1a2"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Tempelkan ke window biar bisa diakses file JS lain (admin.js, mobile.js)
        window.fbDB = db;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbUpdateDoc = updateDoc;
        window.fbDeleteDoc = deleteDoc;
        window.fbDoc = doc;
        window.fbQuery = query;
        window.fbWhere = where;
        window.fbOnSnapshot = onSnapshot;
        window.fbOrderBy = orderBy;
        window.fbLimit = limit;
        
        console.log("Firebase Tracking Unit BYD Siap!");
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
            color: white;
        }

        .splash-icon-box {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseIcon 1.5s infinite alternate;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .splash-title {
            margin-top: 24px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            animation: fadeInUp 1s ease;
        }

        .splash-subtitle {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.8;
            font-weight: 500;
            animation: fadeInUp 1.2s ease;
        }

        @keyframes pulseIcon {
            from {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }

            to {
                transform: scale(1.1);
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-indigo-600 flex items-center justify-center h-screen px-4">
    <!-- SPLASH SCREEN ANIMATION (Only shown once per session) -->
    <div id="splash-screen">
        <div class="splash-icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 13.1V16c0 .6.4 1 1 1h2"></path>
                <circle cx="7" cy="17" r="2"></circle>
                <path d="M9 17h6"></path>
                <circle cx="17" cy="17" r="2"></circle>
            </svg>
        </div>
        <h1 class="splash-title">Tracking Unit</h1>
        <p class="splash-subtitle">Monitoring & Progres Harian</p>
    </div>
    <script>
        if (sessionStorage.getItem('splash_shown')) {
            const splash = document.getElementById('splash-screen');
            if (splash) splash.remove();
        } else {
            sessionStorage.setItem('splash_shown', 'true');
            window.addEventListener('load', () => {
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    if (splash) {
                        splash.style.opacity = '0';
                        splash.style.visibility = 'hidden';
                        setTimeout(() => splash.remove(), 500);
                    }
                }, 2000); // 2 second animation duration
            });
        }
    </script>
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm border border-slate-200">
        <div class="text-center mb-6">
            <div
                class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
                <i data-lucide="car-front" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Selamat Datang</h1>
        </div>

        <div id="error-msg" class="bg-red-100 text-red-600 p-3 rounded-lg text-sm mb-4 text-center font-bold hidden">
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label>
                <input type="text" id="username"
                    class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:border-indigo-500"
                    required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:border-indigo-500 pr-10"
                        required>
                    <button type="button" id="toggle-password"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-indigo-500">
                        <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="btn-login"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Masuk</button>
        </form>


    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        // Toggle Password Visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'text') {
                togglePassword.innerHTML = '<i data-lucide="eye-off" id="eye-icon" class="w-5 h-5"></i>';
            } else {
                togglePassword.innerHTML = '<i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>';
            }
            lucide.createIcons();
        });

        // Jika sudah login, redirect
        const session = Auth.getSession();
        if (session) {
            // Walaupun admin, masuknya tetap ke aplikasi tracking (mobile.html) sesuai request
            window.location.href = 'mobile.html';
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.innerText = 'Memproses...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            const user = await Auth.login(username, password);

            if (user) {
                // Walaupun admin, masuknya tetap ke aplikasi tracking (mobile.html) sesuai request
                window.location.href = 'mobile.html';
            } else {
                errorDiv.innerText = 'Username atau Password salah!';
                errorDiv.classList.remove('hidden');
                btn.innerText = 'Masuk Aplikasi';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
