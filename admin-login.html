<!DOCTYPE html>
<html lang="id">

<head>
    <title>Login Dashboard Admin - BYD</title>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    
    <!-- Firebase SDK (v11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7efhwFGSiNQWXvwqKgeNJP1g4Mx7D4aQ",
            authDomain: "trackingunit-byd.firebaseapp.com",
            projectId: "trackingunit-byd",
            storageBucket: "trackingunit-byd.firebasestorage.app",
            messagingSenderId: "554061694215",
            appId: "1:554061694215:web:869bfdd502fd5777fef1a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.fbDB = db;
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbGetDocs = getDocs;
        window.fbUpdateDoc = updateDoc;
        window.fbDeleteDoc = deleteDoc;
        window.fbDoc = doc;
        window.fbQuery = query;
        window.fbWhere = where;
        window.fbOnSnapshot = onSnapshot;
        window.fbOrderBy = orderBy;
        window.fbLimit = limit;
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .login-card { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md login-card">
        <div class="bg-white rounded-[32px] shadow-2xl shadow-indigo-100 p-10 border border-slate-100">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 13.1V16c0 .6.4 1 1 1h2"></path>
                        <circle cx="7" cy="17" r="2"></circle>
                        <path d="M9 17h6"></path>
                        <circle cx="17" cy="17" r="2"></circle>
                    </svg>
                </div>
                <h1 id="login-greeting" class="text-3xl font-black text-slate-800">Selamat Datang</h1>
                <p class="text-slate-400 mt-2 font-semibold">Silakan masuk ke dashboard BYD Tracker</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Username Admin</label>
                    <input type="text" id="username" required
                        class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all font-semibold pr-12">
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition">
                            <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-2xl text-sm font-bold text-center border border-red-100">
                    Username atau Password salah!
                </div>

                <button type="submit" id="btn-login"
                    class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all">
                    Masuk
                </button>
            </form>
            

        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();

        // Dynamic Greeting
        function setGreeting() {
            const hour = new Date().getHours();
            let greet = "Pagi";
            if (hour >= 18 || hour < 5) greet = "Malam";
            else if (hour >= 15) greet = "Sore";
            else if (hour >= 11) greet = "Siang";
            
            const greetEl = document.getElementById('login-greeting');
            if (greetEl) greetEl.innerText = "Selamat " + greet;
        }
        setGreeting();

        // Check if already logged in
        const session = Auth.getSession();
        if (session && (session.role === 'admin' || session.role === 'admin_bp')) {
            window.location.href = '../admin/';
        }

        // Toggle Password
        document.getElementById('toggle-password').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            icon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('btn-login');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.innerText = 'Memproses...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            const user = await Auth.login(username, password);

            if (user && (user.role === 'admin' || user.role === 'admin_bp')) {
                window.location.href = '../admin/';
            } else if (user) {
                // User logged in but NOT an admin
                errorDiv.innerText = 'Akses Ditolak: Anda bukan Admin!';
                errorDiv.classList.remove('hidden');
                btn.innerText = 'Masuk';
                btn.disabled = false;
            } else {
                errorDiv.innerText = 'Username atau Password salah!';
                errorDiv.classList.remove('hidden');
                btn.innerText = 'Masuk';
                btn.disabled = false;
                // NO RELOAD here, so data stays
            }
        });
    </script>
</body>
</html>
